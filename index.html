<!-- Ikony -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url(https://images3.alphacoders.com/608/608908.jpg) no-repeat center center/cover;
    }

    .phone {
        width: 320px;
        padding: 30px 20px;
        text-align: center;
        color: white;
    }

    .profile img {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid white;
        margin-bottom: 10px;
    }

    .profile h2 {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 2px;
    }

    .profile p {
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 25px;
    }

    .link-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        background: #f2f2f2;
        color: #333;
        padding: 14px;
        border-radius: 12px;
        margin-bottom: 15px;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s ease;
    }

    .link-btn i {
        font-size: 18px;
        color: #6a5acd;
    }

    .link-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .socials {
        margin-top: 25px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .socials a {
        color: white;
        font-size: 20px;
        transition: 0.3s;
    }

    .socials a:hover {
        color: #cfd8ff;
        transform: scale(1.2);
    }

    .socials img {
        color: white;
        height: 27px;
    }

    .socials img:hover {
        color: #cfd8ff;
        transform: scale(1.2);
    }
</style>
</head>
<body>

<div class="phone">

    </div>

    <a href="#" class="link-btn">
        Portfolio
    </a>
        
    <a href="#" class="link-btn">

    <a href="#" class="link-btn">

</div>
